      recommended: 20
      range: [10, 60]
      rationale: "20 days = 1 month rolling, captures regime shifts"
      
    rebalance_frequency:
      recommended: "weekly"
      range: ["daily", "monthly"]
      rationale: "Balance transaction costs vs. adaptation"
      
    allocation_rule:
      formula: "weight_asset1 = k / vol_ratio"
      k_value: "Target volatility (e.g., 0.10 for 10% vol)"
