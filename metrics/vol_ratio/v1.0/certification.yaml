# ========================================
# MIF v4.0 CERTIFICATION - vol_ratio
# ========================================
# Status: ✅ CERTIFIED
# Date: 2025-10-19
# Framework: MIF v4.0 (Data Quality First + Mathematical Limits + Adaptive Testing)
# ========================================

metric:
  name: "vol_ratio"
  version: "1.0"
  domain: "risk"
  author: "QAAF Metrics Team"
  date_created: "2025-10-15"
  date_certified: "2025-10-19"
  
  description:
    short: "Ratio of rolling volatilities between two assets"
    long: |
      Measures relative volatility (σ₁/σ₂) using rolling standard deviation 
      of returns. Critical for risk-parity allocation where position sizing 
      must be inversely proportional to volatility.
      
      Higher values indicate Asset1 is more volatile than Asset2, triggering
      reduced allocation to Asset1 or increased hedging.
  
  formula:
    mathematical: "vol_ratio(t) = σ₁(t) / σ₂(t)"
    implementation: "sigma1.rolling(window).std() / (sigma2.rolling(window).std() + epsilon)"
    
  parameters:
    window:
      value: 20
      type: "int"
      range: "[10, 90]"
      optimal: "20-60"
      description: "Rolling window for volatility calculation (days)"
      
    min_periods:
      value: 5
      type: "int"
      range: "[3, window//2]"
      optimal: "max(5, window//4)"
      description: "Minimum periods required for valid calculation"
      
    epsilon:
      value: 1.0e-8
      type: "float"
      range: "[1e-10, 1e-6]"
      optimal: "1e-8"
      description: "Protection against division by zero"

# ========================================
# CLASSIFICATION (Auto-Detected)
# ========================================
classification:
  domain: "risk"
  scale: "relative"
  memory: "rolling"
  sticky_desired: true
  primary_action: "allocation"
  
  rationale:
    domain: "Contains 'volatility' and 'std' keywords → risk metric"
    sticky: "High autocorr desired for stable allocation (risk-parity)"
    scale: "Ratio of two quantities → relative scale"
  
  test_priorities:
    1_critical: "oos_generalization"
    2_required: "persistence"
    3_required: "discrimination"
    4_required: "lookahead_bias"
    5_optional: "variance"
    6_optional: "orthogonality"
  
  thresholds:
    persistence_min: 0.3
    oos_degradation_max: 0.40
    discrimination_min: 0.05
    lookahead_mismatch_max: 0.05
    variance_min: 0.05
    orthogonality_max: 0.5

